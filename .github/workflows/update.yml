name: Update News

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00 = 北京时间 08:00
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch news & build HTML
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch.py

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git stash
          git pull --rebase
          git stash pop
          git diff --staged --quiet || git commit -m "chore: update news $(date +'%Y-%m-%d %H:%M UTC')"
          git push
